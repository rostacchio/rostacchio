Name: Metrics

on:
  # Schedule updates (each hour)
  schedule:
    - cron: "0 * * * *"

  workflow_dispatch:

  # Run on push
  push:
    branches:
      - master
      - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest

    environment:
      name: production

    permissions:
      contents: write

    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}

          # Options
          user: rostacchio
          template: classic
          base: header, activity, repositories
          config_timezone: Europe/London

          # Introduction (Bio)
          plugin_introduction: yes
          plugin_introduction_title: yes
          plugin_introduction_description: |
            "Never pay any attention to what the critics have to say. A statue has never been erected in honour of a critic." - Jean Sibelius

          # Calendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
